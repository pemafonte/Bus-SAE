# PostgreSQL com dados persistentes (volume Docker).
# Os dados sobrevivem a: alterações no código, git pull, rebuild da imagem.
# Perdem-se apenas se correr: docker compose down -v  (o -v apaga o volume).

services:
  postgres:
    image: postgres:16-alpine
    container_name: bus-platform-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bus_platform
    ports:
      - "5432:5432"
    volumes:
      - bus_platform_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bus_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  bus_platform_pgdata:
